name: REUSE

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# actions/checkout needs contents:read to clone a private repo;
# anonymous clone only works for public repos.
permissions:
  contents: read

jobs:
  compliance-check:
    name: Compliance Check
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v7.0.1
    - name: Execute REUSE Compliance Check
      uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6.0.0
